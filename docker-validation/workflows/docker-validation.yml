name: Docker Image Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  validate-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image_group:
          - "econs-ds"
          - "ff-mle"
      fail-fast: false
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml asyncio
          
      - name: Install security scanning tools
        run: |
          # Install Trivy
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
          # Install Docker Scout (if available)
          docker version
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Validate Docker images
        run: |
          cd docker-validation
          python scripts/validate_image.py \
            --config config/images.yaml \
            --filter ${{ matrix.image_group }} \
            --output validation-report-${{ matrix.image_group }}.json \
            --verbose
            
      - name: Upload validation report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: validation-report-${{ matrix.image_group }}
          path: docker-validation/validation-report-${{ matrix.image_group }}.json
          
      - name: Check validation results
        run: |
          cd docker-validation
          if [ -f validation-report-${{ matrix.image_group }}.json ]; then
            failed_count=$(python -c "
            import json
            with open('validation-report-${{ matrix.image_group }}.json') as f:
                data = json.load(f)
            print(data['validation_summary']['failed'])
            ")
            
            if [ "$failed_count" -gt 0 ]; then
              echo "❌ $failed_count image(s) failed validation"
              exit 1
            else
              echo "✅ All images passed validation"
            fi
          else
            echo "❌ Validation report not found"
            exit 1
          fi

  generate-summary:
    runs-on: ubuntu-latest
    needs: validate-images
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download all validation reports
        uses: actions/download-artifact@v3
        with:
          path: validation-reports
          
      - name: Generate summary report
        run: |
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path
          
          reports_dir = Path('validation-reports')
          summary = {
              'total_images': 0,
              'passed': 0,
              'failed': 0,
              'groups': {}
          }
          
          for report_dir in reports_dir.iterdir():
              if report_dir.is_dir():
                  for report_file in report_dir.glob('*.json'):
                      with open(report_file) as f:
                          data = json.load(f)
                      
                      group_name = report_file.stem.replace('validation-report-', '')
                      summary['groups'][group_name] = data['validation_summary']
                      summary['total_images'] += data['validation_summary']['total_images']
                      summary['passed'] += data['validation_summary']['passed']
                      summary['failed'] += data['validation_summary']['failed']
          
          print("## Docker Image Validation Summary")
          print(f"- **Total Images**: {summary['total_images']}")
          print(f"- **Passed**: {summary['passed']} ✅")
          print(f"- **Failed**: {summary['failed']} ❌")
          print()
          
          for group, stats in summary['groups'].items():
              print(f"### {group}")
              print(f"- Images: {stats['total_images']}")
              print(f"- Passed: {stats['passed']} ✅")
              print(f"- Failed: {stats['failed']} ❌")
              print()
          
          with open('validation-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          EOF
          
      - name: Upload summary report
        uses: actions/upload-artifact@v3
        with:
          name: validation-summary
          path: validation-summary.json
